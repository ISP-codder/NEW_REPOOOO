<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Иски - ЮК ШИП</title>
		<style>
			:root {
				--page-bg: #f9f6f1; /* Цвет фона из макета */
				--input-border: #1a1a1a;
				--button-bg: #c5a47e; /* Цвет кнопки */
				--link-blue: #004a99;
			}

			body {
				margin: 0;
				padding: 0;
				/* Использование шрифта с засечками для соответствия дизайну */
				flex-direction: column;
				font-family: 'Times New Roman', Times, serif;
				background-color: var(--page-bg);
				display: flex;
				justify-content: center;
			}

			.app-container {
				width: 100%;
				max-width: 600px; /* Ограничение ширины как на скриншоте */
				padding: 20px;
			}

			.form-container {
				display: flex;
				flex-direction: column;
			}

			.input-field {
				margin-bottom: 22px; /* Расстояние между полями */
			}

			.input-field label {
				display: block;
				font-size: 19px;
				font-weight: 500;
				margin-bottom: 6px;
				color: #1a1a1a;
			}

			/* Особый стиль для подчеркнутого заголовка */
			.underlined-label {
				text-decoration: underline;
				color: var(--link-blue);
				font-weight: bold;
			}

			.input-field input {
				width: 100%;
				height: 34px;
				border: 1px solid var(--input-border);
				border-radius: 10px; /* Скругление рамок */
				background: transparent;
				padding: 0 10px;
				box-sizing: border-box;
				font-size: 16px;
				outline: none;
			}

			.action-section {
				display: flex;
				justify-content: center;
				margin-top: 25px;
				padding-bottom: 40px;
			}

			.btn-generate {
				background-color: var(--button-bg);
				border: none;
				border-radius: 14px; /* Закругление углов кнопки */
				padding: 12px 60px;
				font-size: 30px; /* Крупный текст кнопки */
				font-family: 'Times New Roman', serif;
				color: #2c2c2c;
				cursor: pointer;
				transition: filter 0.2s;
			}

			.btn-generate:hover {
				filter: brightness(0.9);
			}
		</style>
	</head>
	<script>
		function fillTestData() {
			const fields = {
				'report-date': '30.12.2025',
				'settlements-count': '5',
				'claims-count': '12',
				'lawsuits-count': '8',
				'lost-cases': '0',
				'won-cases': '7',
				'settlements-sum': '250000',
				'compensation-sum': '150000',
				'monthly-profit': '400000'
			}

			for (let id in fields) {
				const el = document.getElementById(id)
				if (el) el.value = fields[id]
			}
		}

		// Запускаем сразу и через небольшую задержку для надежности в Electron
		fillTestData()
		setTimeout(fillTestData, 100)
		// Тестовые данные для проверки
		document.addEventListener('DOMContentLoaded', () => {
			document.getElementById('report-date').value = '30.12.2025'
			document.getElementById('settlements-count').value = '5'
			document.getElementById('claims-count').value = '12'
			document.getElementById('lawsuits-count').value = '8'
			document.getElementById('lost-cases').value = '0'
			document.getElementById('won-cases').value = '7'
			document.getElementById('settlements-sum').value = '250000'
			document.getElementById('compensation-sum').value = '150000'
			document.getElementById('monthly-profit').value = '400000'
		})
	</script>
	<body>
		<div class="app-container">
			<main class="form-container">
				<div class="input-field">
					<label>Дата отчета</label>
					<input type="text" id="report-date" value="24.03.2026" />
				</div>

				<div class="input-field">
					<label>Количество мировых соглашений</label>
					<input type="number" id="settlements-count" value="14" />
				</div>

				<div class="input-field">
					<label class="underlined-label"
						>Количество претензий, поданных в суд</label
					>
					<input type="number" id="claims-count" value="45" />
				</div>

				<div class="input-field">
					<label>Количество исков, поданных в суд</label>
					<input type="number" id="lawsuits-count" value="32" />
				</div>

				<div class="input-field">
					<label>Количество проигрышей в суде</label>
					<input type="number" id="lost-cases" value="2" />
				</div>

				<div class="input-field">
					<label>Количество побед в суде</label>
					<input type="number" id="won-cases" value="28" />
				</div>

				<div class="input-field">
					<label>Сумма мировых соглашений</label>
					<input type="text" id="settlements-sum" value="1 250 000" />
				</div>

				<div class="input-field">
					<label>Сумма моральной компенсации</label>
					<input type="text" id="compensation-sum" value="450 000" />
				</div>

				<div class="input-field">
					<label>Прибыль за месяц</label>
					<input type="text" id="monthly-profit" value="1 700 000" />
				</div>

				<div class="action-section">
					<button class="btn-generate">Сгенерировать</button>
				</div>
			</main>
		</div>
	</body>
</html>
