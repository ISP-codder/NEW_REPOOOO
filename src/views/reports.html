<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>ООО "ЮК ШИП"</title>
		<link rel="stylesheet" href="../styles/styles.css" />
		<style>
			body {
				margin: 0;
				padding: 0;
				background-color: #faf7f3;
				font-family: 'Times New Roman', Times, serif;
			}

			/* КОНТЕЙНЕР МЕНЮ */
			.tab-menus {
				display: flex; /* Выстраиваем кнопки в ряд */
				background-color: #c9a27a;
				height: 50px;
				width: 100%; /* Растягиваем на всю ширину */
				box-sizing: border-box;
			}

			/* КНОПКИ */
			.tab-menus button {
				flex: 1; /* ГЛАВНОЕ: каждая кнопка берет равную долю ширины */
				background: none;
				border: none;
				border-right: 1px solid rgba(0, 0, 0, 0.2); /* Тонкий разделитель */
				color: #1a1a1a;
				font-size: 16px;
				cursor: pointer;
				font-family: inherit;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 0 10px;
				transition: background 0.3s ease;
				white-space: nowrap; /* Текст не переносится на новую строку */
			}

			/* Убираем разделитель у последней кнопки */
			.tab-menus button:last-child {
				border-right: none;
			}

			/* Эффект при наведении */
			.tab-menus button:hover {
				background-color: rgba(0, 0, 0, 0.05);
			}

			/* АДАПТИВНОСТЬ: если экран совсем узкий (мобилки) */
			@media (max-width: 768px) {
				.tab-menus {
					height: auto;
					flex-wrap: wrap; /* Кнопки прыгнут на новую строку, если не влезут */
				}
				.tab-menus button {
					flex: 1 0 33.33%; /* По 3 кнопки в ряд на маленьких экранах */
					height: 50px;
					border-bottom: 1px solid rgba(0, 0, 0, 0.1);
				}
			}
			/* Изолированные стили для Отчета (префикс rp-) */
			.rp-view-container {
				padding: 15px;
			}

			.rp-report-stack {
				display: flex;
				flex-direction: column;
				gap: 12px; /* Расстояние между полями */
			}

			.rp-field {
				display: flex;
				flex-direction: column;
				width: 100%;
			}

			.rp-label {
				font-family: 'Times New Roman', serif;
				font-size: 24px;
				font-weight: bold;
				color: #1a2a3a;
				margin-bottom: 6px;
				margin-left: 5px;
			}

			.rp-input {
				width: 100%;
				padding: 12px 16px;
				border: 2px solid #333; /* Жирная рамка */
				border-radius: 9px; /* Закругление углов */
				font-size: 16px;
				font-family: 'Times New Roman', serif;
				background-color: white;
				box-sizing: border-box;
				outline: none;
				transition: border-color 0.2s;
			}

			.rp-input:focus {
				border-color: #731a20; /* Твой бордовый при фокусе */
			}

			/* Ошибка валидации */
			.rp-input.invalid {
				border: 2px solid #ff0011 !important;
				background-color: #fff5f5 !important;
			}

			/* Кнопка */
			.rp-btn-center {
				display: flex;
				justify-content: center;
				margin-top: 40px;
				padding-bottom: 50px;
			}

			.btn-main {
				background-color: #c9a27a; /* Бежевый */
				border: none;
				padding: 18px 100px;
				border-radius: 15px;
				font-size: 32px;
				font-weight: bold;
				color: #333;
				cursor: pointer;
				box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
				transition:
					transform 0.1s,
					background 0.2s;
			}

			.btn-main:hover {
				background-color: #b58f66;
			}

			.btn-main:active {
				transform: scale(0.98);
			}
		</style>
	</head>
	<div class="tab-menus">
		<button onclick="loadView('claims')">Претензии</button>
		<button onclick="loadView('lawsuits')">Иски</button>
		<button onclick="loadView('reports')">Отчет</button>
		<button onclick="loadView('notices')">Уведомления</button>
		<button style="border: none" onclick="loadView('settlements')">
			Мировое соглашение
		</button>
	</div>
	<body class="app-body">
		<div class="rp-view-container">
			<div class="rp-report-stack" id="reportForm">
				<div class="rp-field">
					<label class="rp-label">Дата отчета</label>
					<input type="date" class="rp-input" id="reportDate" />
				</div>

				<div class="rp-field">
					<label class="rp-label">Количество мировых соглашений</label>
					<input
						type="number"
						class="rp-input"
						id="settlementsCount"
						placeholder="0" />
				</div>

				<div class="rp-field">
					<label class="rp-label">Количество претензий, поданных в суд</label>
					<input
						type="number"
						class="rp-input"
						id="claimsToCourtCount"
						placeholder="0" />
				</div>

				<div class="rp-field">
					<label class="rp-label">Количество исков, поданных в суд</label>
					<input
						type="number"
						class="rp-input"
						id="lawsuitsToCourtCount"
						placeholder="0" />
				</div>

				<div class="rp-field">
					<label class="rp-label">Количество проигрышей в суде</label>
					<input
						type="number"
						class="rp-input"
						id="lossesCount"
						placeholder="0" />
				</div>

				<div class="rp-field">
					<label class="rp-label">Количество побед в суде</label>
					<input
						type="number"
						class="rp-input"
						id="winsCount"
						placeholder="0" />
				</div>

				<div class="rp-field">
					<label class="rp-label">Сумма мировых соглашений</label>
					<input
						type="text"
						class="rp-input"
						id="settlementsAmount"
						placeholder="0.00" />
				</div>

				<div class="rp-field">
					<label class="rp-label">Сумма моральной компенсации</label>
					<input
						type="text"
						class="rp-input"
						id="moralCompensationAmount"
						placeholder="0.00" />
				</div>

				<div class="rp-field">
					<label class="rp-label">Прибыль за месяц</label>
					<input
						type="text"
						class="rp-input"
						id="monthlyProfit"
						placeholder="0.00" />
				</div>
			</div>

			<div class="generate-btn-container">
				<button class="btn-main" id="generateBtn">Сгенерировать</button>
			</div>
		</div>

		<div id="errorToast" class="error-toast"></div>
	</body>
</html>
