<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Генерация отчета</title>
		<link rel="stylesheet" href="../styles/styles.css" />
	</head>
	<body>
		<div class="view-container">
			<div class="report-grid" id="reportForm">
				<div class="input-field">
					<label>Дата отчета</label>
					<input type="date" id="reportDate" value="2026-03-25" />
				</div>

				<div class="input-field">
					<label>Количество мировых соглашений</label>
					<input type="number" id="settlementsCount" placeholder="0" />
				</div>

				<div class="input-field">
					<label>Количество претензий, поданных в суд</label>
					<input type="number" id="claimsToCourtCount" placeholder="0" />
				</div>

				<div class="input-field">
					<label>Количество исков, поданных в суд</label>
					<input type="number" id="lawsuitsToCourtCount" placeholder="0" />
				</div>

				<div class="input-field">
					<label>Количество проигрышей в суде</label>
					<input type="number" id="lossesCount" placeholder="0" />
				</div>

				<div class="input-field">
					<label>Количество побед в суде</label>
					<input type="number" id="winsCount" placeholder="0" />
				</div>

				<div class="input-field">
					<label>Сумма мировых соглашений</label>
					<input type="text" id="settlementsAmount" placeholder="0.00" />
				</div>

				<div class="input-field">
					<label>Сумма моральной компенсации</label>
					<input type="text" id="moralCompensationAmount" placeholder="0.00" />
				</div>

				<div class="input-field">
					<label>Прибыль за месяц</label>
					<input type="text" id="monthlyProfit" placeholder="0.00" />
				</div>
			</div>

			<div class="generate-btn-container">
				<button class="btn-main" id="generateBtn">Сгенерировать</button>
			</div>
		</div>

		<div id="errorToast" class="error-toast"></div>
	</body>
</html>
