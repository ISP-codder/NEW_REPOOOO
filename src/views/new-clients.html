<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<div class="new-clients-view">
		<div class="view-header-gold">База данных — Новые клиенты</div>

		<div class="table-controls">
			<div class="search-wrapper">
				<input
					type="text"
					id="clientSearch"
					class="search-input"
					placeholder="Поиск" />
			</div>
		</div>

		<div class="table-container">
			<div class="table-wrapper">
				<table class="clients-table" id="clientsTable">
					<thead>
						<tr>
							<th style="width: 80px">Тип</th>
							<th>Организация / Бренд</th>
							<th>ФИО / Контактное лицо</th>
							<th style="width: 150px">Дата создания</th>
						</tr>
					</thead>
					<tbody id="clientsTableBody"></tbody>
				</table>
			</div>
			<div class="pagination" id="pagination"></div>
		</div>

		<div id="clientModal" class="custom-modal">
			<div class="modal-content">
				<div class="modal-header">
					<h3>Карточка клиента</h3>
					<span class="close-modal" id="closeModal">&times;</span>
				</div>
				<div id="modalBody" class="modal-body"></div>
				<div class="modal-footer">
					<button id="deleteClientBtn" class="delete-client-btn">
						Удалить клиента
					</button>
					<button id="saveClientChanges" class="gold-save-btn">
						Сохранить изменения
					</button>
				</div>
			</div>
		</div>
		<div id="confirmDeleteModal" class="confirm-modal">
			<div class="confirm-modal-content">
				<h4>Подтверждение</h4>
				<p id="confirmDeleteText">
					Вы действительно хотите удалить этого клиента?
				</p>
				<div class="confirm-actions">
					<button id="cancelDeleteBtn" class="cancel-btn">Отмена</button>
					<button id="confirmDeleteBtn" class="confirm-btn">Удалить</button>
				</div>
			</div>
		</div>
	</div>

	<style>
		/* Фоновая подложка (оверлей) — ТЕПЕРЬ FLEX-КОНТЕЙНЕР */
		.confirm-modal {
			display: none; /* Переключается на flex в JS */
			position: fixed;
			z-index: 99999; /* Максимальный приоритет */
			left: 0;
			top: 0;
			width: 100vw;
			height: 100vh;
			background-color: rgba(0, 0, 0, 0.5);
			backdrop-filter: blur(3px);

			/* Центрирование через Flex */
			align-items: center;
			justify-content: center;
		}

		/* Контентное окно подтверждения (сама белая карточка) */
		.confirm-modal-content {
			background-color: #fdfaf7;
			padding: 25px;
			border-radius: 12px;
			width: 350px;
			text-align: center;
			border: 1px solid #c4a484;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);

			/* Если Flexbox на родителе игнорируется, это сработает как запасной вариант: */
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);

			box-sizing: border-box;
			margin: 0; /* Убираем возможные внешние отступы */
		}

		@keyframes slideInDownModal {
			from {
				transform: translateY(-30px);
				opacity: 0;
			}
			to {
				transform: translateY(0);
				opacity: 1;
			}
		}

		/* Заголовок "Подтверждение" */
		.confirm-modal-content h4 {
			color: #731a20; /* Фирменный красный */
			margin-top: 0;
			margin-bottom: 15px;
			font-size: 20px;
			font-family: 'Times New Roman', serif;
		}

		/* Текст вопроса */
		#confirmDeleteText {
			color: #333;
			font-size: 15px;
			line-height: 1.5;
			margin-bottom: 25px;
			padding: 0 10px;
		}

		/* Блок кнопок */
		.confirm-actions {
			display: flex;
			justify-content: center;
			gap: 12px;
		}

		/* Кнопка Отмена */
		.cancel-btn {
			background: #fff;
			border: 1px solid #999;
			color: #666;
			padding: 10px 24px;
			border-radius: 6px;
			cursor: pointer;
			font-weight: bold;
		}

		.cancel-btn:hover {
			background: #f0f0f0;
		}

		/* Кнопка Удалить */
		.confirm-btn {
			background: #731a20;
			border: none;
			color: white;
			padding: 10px 24px;
			border-radius: 6px;
			cursor: pointer;
			font-weight: bold;
		}

		.confirm-btn:hover {
			background: #a3262e;
			box-shadow: 0 4px 12px rgba(115, 26, 32, 0.25);
		}
		.new-clients-view {
			display: flex;
			flex-direction: column;
			height: 100vh;
			font-family: 'Times New Roman', Times, serif;
			background-color: #fdfaf7;
			box-sizing: border-box;
		}

		.view-header-gold {
			background-color: #c4a484;
			padding: 12px 20px;
			font-weight: bold;
			font-size: 1.1rem;
			color: #2c2c2c;
			flex-shrink: 0;
		}

		.table-controls {
			display: flex;
			justify-content: flex-end;
			padding: 10px 25px;
			flex-shrink: 0;
		}

		.search-wrapper {
			position: relative;
			width: 300px;
		}

		.search-input {
			width: 100%;
			padding: 8px 12px 8px 35px;
			border: 1px solid #333;
			border-radius: 10px;
			outline: none;
			font-family: inherit;
		}

		.search-icon {
			position: absolute;
			left: 12px;
			top: 50%;
			transform: translateY(-50%);
			color: #666;
		}

		/* Фрейм и обертка для растягивания */
		.table-container {
			padding: 0 25px;
			flex-grow: 1;
			display: flex;
			flex-direction: column;
			min-height: 0;
		}

		.table-wrapper {
			border: 1px solid #999;
			background: white;
			flex-grow: 1;
			display: flex;
			overflow: hidden;
		}

		.clients-table {
			width: 100%;
			border-collapse: collapse;
			table-layout: fixed;
		}

		.clients-table th {
			background-color: #f8f8f8;
			border-bottom: 2px solid #999;
			height: 50px;
			text-align: center;
		}

		.clients-table td {
			border-bottom: 1px solid #eee;
			text-align: center;
			height: 50px;
			padding: 0 10px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			cursor: pointer;
		}

		.clients-table tr:hover:not(.empty-row) {
			background-color: #f9f4ef;
		}

		.clients-table th:not(:last-child),
		.clients-table td:not(:last-child) {
			border-right: 1px solid #ccc;
		}
		/* Находим стили для первой колонки */
		.clients-table th:first-child,
		.clients-table td:first-child {
			width: 120px !important; /* Увеличиваем ширину, чтобы влезло "Иностранный" */
			min-width: 120px;
			text-align: left !important; /* Выравнивание по левому краю */
			padding-left: 15px !important; /* Одинаковый отступ от стенки для всех типов */
		}

		/* Убираем многоточие, если оно было настроено слишком жестко */
		.clients-table td:first-child b {
			white-space: nowrap;
			overflow: visible;
		}
		.empty-row td {
			cursor: default;
			background-color: #ffffff;
		}

		.pagination {
			display: flex;
			justify-content: center;
			padding: 15px 0;
			gap: 5px;
			flex-shrink: 0;
		}

		/* Стили модальных окон (без изменений) */
		.custom-modal,
		.confirm-modal {
			display: none;
			position: fixed;
			z-index: 1000;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			background-color: rgba(0, 0, 0, 0.5);
		}

		.modal-content {
			background-color: white;
			margin: 5% auto;
			padding: 20px;
			width: 500px;
			border-radius: 12px;
		}

		.modal-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			border-bottom: 1px solid #eee;
			padding-bottom: 10px;
		}
		.close-modal {
			cursor: pointer;
			font-size: 24px;
		}
		.modal-body {
			max-height: 400px;
			overflow-y: auto;
			padding: 15px 0;
		}
		.modal-footer {
			border-top: 1px solid #eee;
			padding-top: 15px;
			display: flex;
			justify-content: space-between;
		}

		.gold-save-btn {
			background: #c4a484;
			border: none;
			padding: 10px 20px;
			border-radius: 8px;
			cursor: pointer;
			font-weight: bold;
		}
		.delete-client-btn {
			background: #fdfaf7;
			border: 1px solid #731a20;
			color: #731a20;
			padding: 10px 20px;
			border-radius: 8px;
			cursor: pointer;
		}

		.page-btn {
			min-width: 30px;
			height: 30px;
			border: 1px solid #333;
			background: white;
			border-radius: 4px;
			cursor: pointer;
		}
		.page-btn.active {
			background-color: #eee;
			font-weight: bold;
		}
	</style>
</html>
