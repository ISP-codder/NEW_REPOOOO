<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>ООО "ЮК ШИП"</title>
		<link rel="stylesheet" href="../styles/styles.css" />
		<style>
			body {
				margin: 0;
				padding: 0;
				background-color: #faf7f3;
				font-family: 'Times New Roman', Times, serif;
			}

			/* КОНТЕЙНЕР МЕНЮ */
			.tab-menus {
				display: flex; /* Выстраиваем кнопки в ряд */
				background-color: #c9a27a;
				height: 50px;
				width: 100%; /* Растягиваем на всю ширину */
				box-sizing: border-box;
			}

			/* КНОПКИ */
			.tab-menus button {
				flex: 1; /* ГЛАВНОЕ: каждая кнопка берет равную долю ширины */
				background: none;
				border: none;
				border-right: 1px solid rgba(0, 0, 0, 0.2); /* Тонкий разделитель */
				color: #1a1a1a;
				font-size: 16px;
				cursor: pointer;
				font-family: inherit;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 0 10px;
				transition: background 0.3s ease;
				white-space: nowrap; /* Текст не переносится на новую строку */
			}

			/* Убираем разделитель у последней кнопки */
			.tab-menus button:last-child {
				border-right: none;
			}

			/* Эффект при наведении */
			.tab-menus button:hover {
				background-color: #917457;
			}

			/* АДАПТИВНОСТЬ: если экран совсем узкий (мобилки) */
			@media (max-width: 768px) {
				.tab-menus {
					height: auto;
					flex-wrap: wrap; /* Кнопки прыгнут на новую строку, если не влезут */
				}
				.tab-menus button {
					flex: 1 0 33.33%; /* По 3 кнопки в ряд на маленьких экранах */
					height: 50px;
					border-bottom: 1px solid rgba(0, 0, 0, 0.1);
				}
			}
			.st-section {
				margin-bottom: 25px;
			}
			.st-header-container {
				border-bottom: 2px solid black;
				margin-bottom: 10px;
			}
			.st-header {
				font-size: 24px;
				font-weight: bold;
				color: #1a2a3a;
				padding-bottom: 5px;
				margin-left: 10px;
			}

			.st-grid {
				margin-left: 10px;
				margin-right: 10px;
				display: grid;
				grid-template-columns: 1fr 1fr 1fr;
				gap: 15px;
			}

			.st-field {
				display: flex;
				flex-direction: column;
				margin-bottom: 10px;
			}
			.st-full-width {
				margin-left: 10px;
				margin-right: 10px;
				margin-top: 10px;
				border-radius: 9px;
				font-size: 14px;
				background-color: #ffffff;
				transition: border-color 0.2s;
				font-family: 'Times New Roman', serif;
			}

			.st-field label {
				font-size: 16px;
				color: #1f2937;
				margin-left: 10px;
				margin-bottom: 5px;
				margin-top: 10px;
			}
			.st-field input {
				padding: 8px;
				border: 2px solid #333;
				border-radius: 9px;
				font-size: 14px;
				background-color: #ffffff;
				transition: border-color 0.2s;
				font-family: 'Times New Roman', serif;
			}

			.st-field input:focus {
				border-color: #6d272c;
				outline: none;
			}
			.st-field input.invalid {
				border: 2px solid #ff0011 !important;
				background-color: #fff5f5 !important;
			}
			.st-full-width input {
				border-radius: 10px;
				width: 100%;
				box-sizing: border-box;
			}
			.btn-main {
				background-color: #c9a27a;
				border: none;
				padding: 15px 80px;
				border-radius: 10px;
				font-size: 32px;
				font-weight: bold;
				color: #333;
				cursor: pointer;
				transition: background 0.3s;
			}

			.btn-main:hover {
				background-color: #b58f66;
			}
			button.active {
				background-color: #917457;
			}
		</style>
	</head>
	<div class="tab-menus">
		<button onclick="loadView('claims')">Претензии</button>
		<button onclick="loadView('lawsuits')">Иски</button>
		<button onclick="loadView('reports')">Отчет</button>
		<button onclick="loadView('notices')">Уведомления</button>
		<button
			style="border: none"
			onclick="loadView('settlements')"
			class="active">
			Мировое соглашение
		</button>
	</div>
	<body class="app-body">
		<div class="st-container">
			<section class="st-section">
				<div class="st-header-container">
					<h2 class="st-header">Суд</h2>
				</div>
				<div class="st-grid st-3-cols">
					<div class="st-field">
						<label>Наименование суда</label>
						<input type="text" id="courtName" />
					</div>
					<div class="st-field">
						<label>Истец</label>
						<input type="text" id="plaintiffName" />
					</div>
					<div class="st-field">
						<label>Ответчик</label>
						<input type="text" id="defendantName" />
					</div>
					<div class="st-field">
						<label>Адрес суда</label>
						<input type="text" id="courtAddress" />
					</div>
					<div class="st-field">
						<label>Товарный знак</label>
						<input type="text" id="trademarkSettlement" />
					</div>
					<div class="st-field">
						<label>Юр. адрес ответчика</label>
						<input type="text" id="respondentAdress" />
					</div>
				</div>
			</section>

			<section class="st-section">
				<div class="st-header-container">
					<h2 class="st-header">Сумма компенсации</h2>
				</div>
				<div class="st-grid st-3-cols">
					<div class="st-field">
						<label>Сумма</label>
						<input type="text" id="settlementSum" />
					</div>
					<div class="st-field">
						<label>Срок оплаты</label>
						<input type="text" id="paymentDeadline" />
					</div>
				</div>
			</section>

			<section class="st-section">
				<div class="st-header-container">
					<h2 class="st-header">Дата мирового соглашения</h2>
				</div>
				<div class="st-full-width">
					<input type="date" id="settlementDate" />
				</div>
			</section>
			<div class="generate-btn-container">
				<button class="btn-main" id="generateBtn">Сгенерировать</button>
			</div>
		</div>

		<div id="errorToast" class="error-toast"></div>
	</body>
</html>
