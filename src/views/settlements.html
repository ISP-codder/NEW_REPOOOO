<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>ООО "ЮК ШИП"</title>
		<link rel="stylesheet" href="../styles/styles.css" />
		<style>
			.st-section {
				margin-bottom: 25px;
			}
			.st-header-container {
				border-bottom: 2px solid black;
				margin-bottom: 10px;
			}
			.st-header {
				font-size: 24px;
				font-weight: bold;
				color: #1a2a3a;
				padding-bottom: 5px;
				margin-left: 10px;
			}

			.st-grid {
				margin-left: 10px;
				margin-right: 10px;
				display: grid;
				grid-template-columns: 1fr 1fr 1fr;
				gap: 15px;
			}

			.st-field {
				display: flex;
				flex-direction: column;
				margin-bottom: 10px;
			}
			.st-full-width {
				margin-left: 10px;
				margin-right: 10px;
				margin-top: 10px;
				border-radius: 9px;
				font-size: 14px;
				background-color: #ffffff;
				transition: border-color 0.2s;
				font-family: 'Times New Roman', serif;
			}

			.st-field label {
				font-size: 16px;
				color: #1f2937;
				margin-left: 10px;
				margin-bottom: 5px;
				margin-top: 10px;
			}
			.st-field input {
				padding: 8px;
				border: 2px solid black;
				border-radius: 9px;
				font-size: 14px;
				background-color: #ffffff;
				transition: border-color 0.2s;
				font-family: 'Times New Roman', serif;
			}

			.st-field input:focus {
				border-color: #6d272c;
				outline: none;
			}
			.st-field input.invalid {
				border: 2px solid #ff0011 !important;
				background-color: #fff5f5 !important;
			}
			.st-full-width input {
				border-radius: 10px;
				width: 100%;
				box-sizing: border-box;
			}
		</style>
	</head>
	<body class="app-body">
		<div class="st-container">
			<section class="st-section">
				<div class="st-header-container">
					<h2 class="st-header">Суд</h2>
				</div>
				<div class="st-grid st-3-cols">
					<div class="st-field">
						<label>Наименование суда</label>
						<input type="text" id="courtName" />
					</div>
					<div class="st-field">
						<label>Истец</label>
						<input type="text" id="plaintiffName" />
					</div>
					<div class="st-field">
						<label>Ответчик</label>
						<input type="text" id="defendantName" />
					</div>
					<div class="st-field">
						<label>Адрес суда</label>
						<input type="text" id="courtAddress" />
					</div>
					<div class="st-field">
						<label>Товарный знак</label>
						<input type="text" id="trademarkSettlement" />
					</div>
				</div>
			</section>

			<section class="st-section">
				<div class="st-header-container">
					<h2 class="st-header">Сумма компенсации</h2>
				</div>
				<div class="st-grid st-3-cols">
					<div class="st-field">
						<label>Сумма</label>
						<input type="text" id="settlementSum" />
					</div>
					<div class="st-field">
						<label>Срок оплаты</label>
						<input type="text" id="paymentDeadline" />
					</div>
				</div>
			</section>

			<section class="st-section">
				<div class="st-header-container">
					<h2 class="st-header">Дата мирового соглашения</h2>
				</div>
				<div class="st-full-width">
					<input type="date" id="settlementDate" />
				</div>
			</section>
			<div class="generate-btn-container">
				<button class="btn-main" id="generateBtn">Сгенерировать</button>
			</div>
		</div>

		<div id="errorToast" class="error-toast"></div>
	</body>
</html>
