<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<style>
		.activity-container {
			display: flex;
			flex-direction: column;
			height: 100vh;
			font-family: 'Times New Roman', Times, serif;
			background-color: #fdfaf7;
			box-sizing: border-box;
		}

		.view-header {
			background-color: #c4a484;
			padding: 12px 20px;
			font-weight: bold;
			color: #2c2c2c;
			flex-shrink: 0;
		}

		.table-controls {
			display: flex;
			justify-content: flex-end;
			padding: 10px 25px;
			flex-shrink: 0;
		}

		#activitySearch {
			width: 220px;
			padding: 6px 12px;
			border: 1px solid #333;
			border-radius: 10px;
			outline: none;
		}

		.table-frame {
			padding: 0 25px;
			flex-grow: 1;
			display: flex;
			flex-direction: column;
			min-height: 0;
		}

		.table-wrapper {
			border: 1px solid #999;
			background: white;
			flex-grow: 1;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.activity-table {
			width: 100%;
			border-collapse: collapse;
			table-layout: fixed;
		}

		.activity-table th {
			background-color: #f8f8f8;
			border-bottom: 2px solid #999;
			height: 50px;
			position: sticky;
			top: 0;
		}

		.activity-table td {
			border-bottom: 1px solid #eee;
			text-align: center;
			height: 50px;
			padding: 0 10px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.activity-table th:not(:last-child),
		.activity-table td:not(:last-child) {
			border-right: 1px solid #ccc;
		}

		/* Пустые строки для сохранения сетки до самого низа */
		.empty-row td {
			background-color: #ffffff;
			border-bottom: 1px solid #f9f9f9;
		}

		.pagination {
			display: flex;
			justify-content: center;
			padding: 15px 0;
			gap: 5px;
			flex-shrink: 0;
		}

		.page-btn {
			min-width: 30px;
			height: 30px;
			border: 1px solid #333;
			background: white;
			border-radius: 4px;
			cursor: pointer;
		}

		.page-btn.active {
			background-color: #eee;
			font-weight: bold;
		}
	</style>

	<div class="activity-container">
		<div class="view-header">Журнал активности</div>

		<div class="table-controls">
			<input type="text" id="activitySearch" placeholder="Поиск" />
		</div>

		<div class="table-frame">
			<div class="table-wrapper">
				<table class="activity-table">
					<thead>
						<tr>
							<th>Дата и время</th>
							<th>Действие</th>
							<th>Объект</th>
							<th>Исполнитель</th>
						</tr>
					</thead>
					<tbody id="activity-table-body"></tbody>
				</table>
			</div>
		</div>

		<div class="pagination"></div>
	</div>
</html>
