<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<style>
		.activity-table {
			width: 95%;
			margin: 20px auto;
			border-collapse: collapse;
			background: white;
			border-radius: 10px;
			overflow: hidden;
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
		}

		.activity-table th {
			border-bottom: 2px solid #333;
			padding: 12px;
			text-align: left;
		}

		.activity-table td {
			padding: 15px 12px;
			border-bottom: 1px solid #ccc;
			color: #333;
		}

		.pagination {
			display: flex;
			justify-content: center;
			gap: 5px;
			margin-top: 20px;
		}

		.page-btn {
			border: 1px solid #333;
			background: white;
			border-radius: 5px;
			padding: 5px 10px;
			cursor: pointer;
		}

		.page-btn.active {
			background: #eee;
		}
	</style>
	<div class="activity-container">
		<div class="view-header">Журнал активности</div>

		<div class="table-controls">
			<input type="text" id="activitySearch" placeholder="Поиск" />
		</div>

		<table class="activity-table">
			<thead>
				<tr>
					<th>Дата и время</th>
					<th>Действие</th>
					<th>Объект</th>
					<th>Исполнитель</th>
				</tr>
			</thead>
			<tbody id="activity-table-body"></tbody>
		</table>

		<div class="pagination">
			<button class="page-btn active">1</button>
			<button class="page-btn">2</button>
			<button class="page-btn">3</button>
			<span>.......</span>
			<button class="page-btn">15</button>
		</div>
	</div>
</html>
