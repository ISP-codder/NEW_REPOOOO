<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>ООО "ЮК ШИП"</title>
		<style>
			body {
				margin: 0;
				padding: 0;
				background-color: #faf7f3;
				font-family: 'Times New Roman', Times, serif;
			}

			/* КОНТЕЙНЕР МЕНЮ */
			.tab-menus {
				display: flex; /* Выстраиваем кнопки в ряд */
				background-color: #c9a27a;
				height: 50px;
				width: 100%; /* Растягиваем на всю ширину */
				box-sizing: border-box;
			}

			/* КНОПКИ */
			.tab-menus button {
				flex: 1; /* ГЛАВНОЕ: каждая кнопка берет равную долю ширины */
				background: none;
				border: none;
				border-right: 1px solid rgba(0, 0, 0, 0.2); /* Тонкий разделитель */
				color: #1a1a1a;
				font-size: 16px;
				cursor: pointer;
				font-family: inherit;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 0 10px;
				transition: background 0.3s ease;
				white-space: nowrap; /* Текст не переносится на новую строку */
			}

			/* Убираем разделитель у последней кнопки */
			.tab-menus button:last-child {
				border-right: none;
			}

			/* Эффект при наведении */
			.tab-menus button:hover {
				background-color: rgba(0, 0, 0, 0.05);
			}

			/* АДАПТИВНОСТЬ: если экран совсем узкий (мобилки) */
			@media (max-width: 768px) {
				.tab-menus {
					height: auto;
					flex-wrap: wrap; /* Кнопки прыгнут на новую строку, если не влезут */
				}
				.tab-menus button {
					flex: 1 0 33.33%; /* По 3 кнопки в ряд на маленьких экранах */
					height: 50px;
					border-bottom: 1px solid rgba(0, 0, 0, 0.1);
				}
			}
			.nt-section {
				margin-bottom: 25px;
			}

			.nt-header-container {
				border-bottom: 2px solid black;
				margin-bottom: 10px;
			}

			.nt-header {
				font-size: 24px;
				font-weight: bold;
				color: #1a2a3a;
				padding-bottom: 5px;
				margin-left: 10px;
			}

			.nt-grid {
				margin-left: 10px;
				margin-right: 10px;
				display: grid;
				grid-template-columns: 1fr 1fr 1fr;
				gap: 15px;
			}

			.nt-stack {
				display: flex;
				flex-direction: column;
				gap: 15px;
			}

			.nt-field {
				display: flex;
				flex-direction: column;
				margin-bottom: 10px;
			}

			.nt-full-row {
				grid-column: span 1;
			}

			.nt-field label {
				font-size: 16px;
				color: #1f2937;
				margin-left: 10px;
				margin-bottom: 5px;
				margin-top: 10px;
			}

			.nt-field input {
				padding: 8px;
				border: 2px solid black;
				border-radius: 9px;
				font-size: 14px;
				background-color: #ffffff;
				transition: border-color 0.2s;
				font-family: 'Times New Roman', serif;
			}

			.nt-field input:focus {
				border-color: #6d272c;
				outline: none;
			}

			.nt-field input.invalid {
				border: 2px solid #ff0011 !important;
				background-color: #fff5f5 !important;
			}

			.nt-stack .nt-field input {
				width: 100%;
			}

			.nt-btn-main {
				background-color: #c9a27a;
				border: none;
				padding: 15px 80px;
				border-radius: 12px;
				font-size: 32px;
				font-weight: bold;
				color: #333;
				cursor: pointer;
				box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
			}

			.nt-btn-main:hover {
				background-color: #b58f66;
			}
		</style>
	</head>
	<div class="tab-menus">
		<button onclick="loadView('claims')">Претензии</button>
		<button onclick="loadView('lawsuits')">Иски</button>
		<button onclick="loadView('reports')">Отчет</button>
		<button onclick="loadView('notices')">Уведомления</button>
		<button style="border: none" onclick="loadView('settlements')">
			Мировое соглашение
		</button>
	</div>
	<body class="app-body">
		<div class="nt-container">
			<div class="nt-section">
				<div class="nt-header-container">
					<h2 class="nt-header">Магазин</h2>
				</div>

				<div class="nt-grid nt-3-cols">
					<div class="nt-field">
						<label>Название</label>
						<input type="text" id="shopName" value="" />
					</div>
					<div class="nt-field">
						<label>Область, город</label>
						<input type="text" id="shopLocation" value="" />
					</div>
					<div class="nt-field">
						<label>Улица</label>
						<input type="text" id="shopStreet" value="" />
					</div>
				</div>
			</div>

			<div class="nt-section">
				<div class="nt-header-container">
					<h2 class="nt-header">Реквизиты продавца</h2>
				</div>
				<div class="nt-grid nt-3-cols">
					<div class="nt-field">
						<label>Наименование</label>
						<input type="text" id="sellerName" value="" />
					</div>
					<div class="nt-field">
						<label>ОГРН</label>
						<input type="text" id="sellerOgrn" value="" />
					</div>
					<div class="nt-field">
						<label>ИНН</label>
						<input type="text" id="sellerInn" value="" />
					</div>
					<div class="nt-field nt-full-row">
						<label>Юридический адрес</label>
						<input type="text" id="sellerLegalAddress" value="" />
					</div>
				</div>
			</div>

			<div class="nt-section">
				<div class="nt-header-container">
					<h2 class="nt-header">Информация о закупке</h2>
				</div>
				<div class="nt-grid nt-3-cols">
					<div class="nt-field">
						<label>Дата закупки</label>
						<input type="date" id="purchaseDate" value="" />
					</div>
					<div class="nt-field">
						<label>Товарный знак</label>
						<input type="text" id="trademark" value="" />
					</div>
					<div class="nt-field">
						<label>Правообладатель</label>
						<input type="text" id="rightHolder" value="" />
					</div>
				</div>
			</div>

			<div class="nt-section">
				<div class="nt-header-container">
					<h2 class="nt-header">Компенсация</h2>
				</div>
				<div class="nt-stack">
					<div class="nt-field" style="margin-right: 10px; margin-left: 10px">
						<label>Сумма компенсации</label>
						<input type="text" id="compensationAmount" value="" />
					</div>
					<div class="nt-field" style="margin-right: 10px; margin-left: 10px">
						<label>Досудебная компенсация</label>
						<input type="text" id="preTrialCompensation" value="" />
					</div>
				</div>
			</div>

			<div class="generate-btn-container">
				<button class="nt-btn-main" id="generateBtn">Сгенерировать</button>
			</div>
		</div>
	</body>
</html>
