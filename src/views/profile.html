<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<style>
		/* Шапка контента — делаем чуть выразительнее */
		.view-header {
			height: 50px;
			background-color: #c9a27a;
			padding: 15px 25px;
			font-weight: bold;
			font-size: 18px;
			border-bottom: 1px solid rgba(0, 0, 0, 0.1);
			font-family: 'Times New Roman', serif;
		}

		/* Главный контейнер — убираем жесткий лимит ширины для полноэкранного режима */
		.profile-form {
			padding: 30px;
			max-width: 100%; /* Теперь тянется на весь экран */
			display: flex;
			flex-direction: column; /* Делим на две колонки для наполненности */
			gap: 10px;
			box-sizing: border-box;
		}

		/* Поля, которые должны занимать всю ширину (например, ФИО) */
		.profile-field:first-child,
		.save-btn-container {
			grid-column: span 2;
		}

		.profile-field {
			margin-bottom: 10px;
		}

		.profile-field label {
			margin-left: 5px;
			display: block;
			font-size: 14px;
			color: #444;
			margin-bottom: 6px;
			font-weight: bold;
		}

		.profile-field input,
		.profile-field select {
			width: 100%;
			padding: 12px 15px; /* Увеличенные отступы для визуального веса */
			border: 2px solid #333;
			border-radius: 8px;
			font-family: 'Times New Roman', serif;
			font-size: 16px;
			box-sizing: border-box;
			background-color: white;
		}

		/* Стили для кнопки сохранения (используем твой класс btn-main) */
		.save-btn-container {
			margin-top: 20px;
			display: flex;
			justify-content: center;
		}

		.btn-main {
			background-color: #c9a27a;
			color: #2c2c2c;
			border: none;
			padding: 12px 60px;
			font-size: 26px;
			border-radius: 12px;
			cursor: pointer;
			font-family: inherit;
			box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
			transition: background-color 0.2s;
		}

		.btn-main:hover {
			background-color: #c9a27a;
		}

		/* Классы для аватара оставляем, чтобы не ломать логику, если она на них завязана */
		.user-avatar-btn {
			width: 60px;
			height: 60px;
			background: white;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 24px;
			font-weight: bold;
			box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
		}
	</style>
	<body>
		<div class="profile-container">
			<div class="view-header">Личный кабинет</div>

			<div class="profile-form">
				<div class="profile-field">
					<label>ФИО</label>
					<input
						type="text"
						id="profileFio"
						placeholder="Иванов Иван Иванович" />
				</div>

				<div class="profile-field">
					<label>Ваш логин</label>
					<input
						type="text"
						id="profileLogin"
						readonly
						style="background: #f0f0f0" />
				</div>

				<div class="profile-field">
					<label>Должность</label>
					<input type="text" id="profilePosition" placeholder="Юрист" />
				</div>

				<div class="profile-field">
					<label>Дата регистрации</label>
					<input
						type="text"
						id="profileRegDate"
						readonly
						style="background: #f0f0f0" />
				</div>

				<div class="profile-field">
					<label>Email</label>
					<input
						type="email"
						id="profileEmail"
						placeholder="ivanov.2@yandex.ru" />
				</div>

				<div class="profile-field">
					<label>Телефон</label>
					<input type="text" id="profilePhone" placeholder="8-989-504-29-34" />
				</div>

				<div class="profile-field">
					<label>Дата и время последнего входа</label>
					<input
						type="text"
						id="profileLastLogin"
						readonly
						style="background: #f0f0f0" />
				</div>

				<div class="profile-field">
					<label>Количество выполненных действий</label>
					<input
						type="number"
						id="profileActions"
						readonly
						style="background: #f0f0f0" />
				</div>

				<div class="profile-field">
					<label>Статус активности</label>
					<select id="profileStatus">
						<option value="active">Активен</option>
						<option value="inactive">Неактивен</option>
						<option value="blocked">Заблокирован</option>
					</select>
				</div>

				<div class="save-btn-container">
					<button id="saveProfileBtn" class="btn-main">Сохранить данные</button>
				</div>
			</div>
		</div>
	</body>
</html>
