<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>ООО "ЮК ШИП"</title>
		<link rel="stylesheet" href="../styles/styles.css" />
		<style>
			body {
				margin: 0;
				padding: 0;
				background-color: #faf7f3;
				font-family: 'Times New Roman', Times, serif;
			}

			/* КОНТЕЙНЕР МЕНЮ */
			.tab-menus {
				display: flex; /* Выстраиваем кнопки в ряд */
				background-color: #c9a27a;
				height: 50px;
				width: 100%; /* Растягиваем на всю ширину */
				box-sizing: border-box;
			}

			/* КНОПКИ */
			.tab-menus button {
				flex: 1; /* ГЛАВНОЕ: каждая кнопка берет равную долю ширины */
				background: none;
				border: none;
				border-right: 1px solid rgba(0, 0, 0, 0.2); /* Тонкий разделитель */
				color: #1a1a1a;
				font-size: 16px;
				cursor: pointer;
				font-family: inherit;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 0 10px;
				transition: background 0.3s ease;
				white-space: nowrap; /* Текст не переносится на новую строку */
			}

			/* Убираем разделитель у последней кнопки */
			.tab-menus button:last-child {
				border-right: none;
			}

			/* Эффект при наведении */
			.tab-menus button:hover {
				background-color: rgba(0, 0, 0, 0.05);
			}

			/* АДАПТИВНОСТЬ: если экран совсем узкий (мобилки) */
			@media (max-width: 768px) {
				.tab-menus {
					height: auto;
					flex-wrap: wrap; /* Кнопки прыгнут на новую строку, если не влезут */
				}
				.tab-menus button {
					flex: 1 0 33.33%; /* По 3 кнопки в ряд на маленьких экранах */
					height: 50px;
					border-bottom: 1px solid rgba(0, 0, 0, 0.1);
				}
			}
			.ls-header-container {
				border-bottom: 2px solid black;
				margin-bottom: 10px;
			}
			.ls-section {
				margin-bottom: 25px;
			}

			.ls-header {
				font-size: 24px;
				padding-bottom: 5px;
				color: #333;
				margin-left: 10px;
			}

			.ls-grid {
				margin-left: 10px;
				margin-right: 10px;
				display: grid;
				grid-template-columns: 1fr 1fr 1fr;
				gap: 15px;
			}

			.ls-field {
				display: flex;
				flex-direction: column;
				margin-bottom: 10px;
			}

			.ls-full {
				grid-column: span 3;
			}

			.ls-field label {
				font-size: 16px;
				color: #1f2937;
				margin-left: 10px;
				margin-bottom: 5px;
				margin-top: 10px;
			}

			.ls-field input {
				padding: 8px;
				border: 2px solid #333;
				border-radius: 9px;
				font-size: 14px;
				background-color: #ffffff;
				transition: border-color 0.2s;
				font-family: 'Times New Roman', serif;
			}

			.ls-field input:focus {
				border-color: #6d272c;
				outline: none;
			}

			.ls-field input.invalid {
				border: 2px solid #ff0011 !important;
				background-color: #fff5f5 !important;
			}

			.ls-btn-wrap {
				display: flex;
				justify-content: center;
				margin-top: 30px;
				padding-bottom: 40px;
			}

			.ls-btn-main {
				background-color: #c9a27a;
				border: none;
				padding: 15px 80px;
				border-radius: 10px;
				font-size: 32px;
				font-weight: bold;
				color: #333;
				cursor: pointer;
				transition: background 0.3s;
			}

			.ls-btn-main:hover {
				background-color: #b58f66;
			}
		</style>
	</head>
	<div class="tab-menus">
		<button onclick="loadView('claims')">Претензии</button>
		<button onclick="loadView('lawsuits')">Иски</button>
		<button onclick="loadView('reports')">Отчет</button>
		<button onclick="loadView('notices')">Уведомления</button>
		<button style="border: none" onclick="loadView('settlements')">
			Мировое соглашение
		</button>
	</div>
	<body class="app-body">
		<main class="ls-container">
			<section class="ls-section">
				<div class="ls-header-container">
					<h2 class="ls-header">Суд</h2>
				</div>
				<div class="ls-grid ls-3-cols">
					<div class="ls-field">
						<label>Наименование суда</label>
						<input type="text" id="courtName" />
					</div>
					<div class="ls-field">
						<label>Истец</label>
						<input type="text" id="plaintiffName" />
					</div>
					<div class="ls-field">
						<label>Представитель истца</label>
						<input type="text" id="representativeName" />
					</div>
					<div class="ls-field">
						<label>Адрес суда</label>
						<input type="text" id="courtAddress" />
					</div>
				</div>
			</section>

			<section class="ls-section">
				<div class="ls-header-container">
					<h2 class="ls-header">Магазин</h2>
				</div>
				<div class="ls-grid ls-3-cols">
					<div class="ls-field">
						<label>Название</label>
						<input type="text" id="shopName" />
					</div>
					<div class="ls-field">
						<label>Область, город</label>
						<input type="text" id="shopLocation" />
					</div>
					<div class="ls-field">
						<label>Улица</label>
						<input type="text" id="shopStreet" />
					</div>
				</div>
			</section>

			<section class="ls-section">
				<div class="ls-header-container">
					<h2 class="ls-header">Реквизиты продавца</h2>
				</div>
				<div class="ls-grid ls-3-cols">
					<div class="ls-field">
						<label>Наименование</label>
						<input type="text" id="sellerName" />
					</div>
					<div class="ls-field">
						<label>ОГРН</label>
						<input type="text" id="sellerOgrn" />
					</div>
					<div class="ls-field">
						<label>ИНН</label>
						<input type="text" id="sellerInn" />
					</div>
					<div class="ls-field">
						<label>Юридический адрес</label>
						<input type="text" id="sellerLegalAddress" />
					</div>
				</div>
			</section>

			<section class="ls-section">
				<div class="ls-header-container">
					<h2 class="ls-header">Информация о закупке</h2>
				</div>
				<div class="ls-grid ls-3-cols">
					<div class="ls-field">
						<label>Дата закупки</label>
						<input type="date" id="purchaseDate" />
					</div>
					<div class="ls-field">
						<label>Категория</label>
						<input type="text" id="productCategory" />
					</div>
					<div class="ls-field">
						<label>Стоимость</label>
						<input type="number" id="productPrice" />
					</div>
					<div class="ls-field">
						<label>Количество</label>
						<input type="number" id="productCount" />
					</div>
					<div class="ls-field">
						<label>Товарный знак</label>
						<input type="text" id="trademark" />
					</div>
				</div>
			</section>

			<div class="ls-btn-wrap">
				<button class="ls-btn-main" id="generateLawsuitBtn">
					Сгенерировать
				</button>
			</div>
		</main>
	</body>
</html>
