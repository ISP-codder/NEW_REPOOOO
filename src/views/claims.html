<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>ООО "ЮК ШИП"</title>
		<style>
			body {
				margin: 0;
				padding: 0;
				background-color: #faf7f3;
				font-family: 'Times New Roman', Times, serif;
			}

			/* КОНТЕЙНЕР МЕНЮ */
			.tab-menus {
				display: flex; /* Выстраиваем кнопки в ряд */
				background-color: #c9a27a;
				height: 50px;
				width: 100%; /* Растягиваем на всю ширину */
				box-sizing: border-box;
			}

			/* КНОПКИ */
			.tab-menus button {
				flex: 1; /* ГЛАВНОЕ: каждая кнопка берет равную долю ширины */
				background: none;
				border: none;
				border-right: 1px solid rgba(0, 0, 0, 0.2); /* Тонкий разделитель */
				color: #1a1a1a;
				font-size: 16px;
				cursor: pointer;
				font-family: inherit;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 0 10px;
				transition: background 0.3s ease;
				white-space: nowrap; /* Текст не переносится на новую строку */
			}

			/* Убираем разделитель у последней кнопки */
			.tab-menus button:last-child {
				border-right: none;
			}

			/* Эффект при наведении */
			.tab-menus button:hover {
				background-color: rgba(0, 0, 0, 0.05);
			}

			/* АДАПТИВНОСТЬ: если экран совсем узкий (мобилки) */
			@media (max-width: 768px) {
				.tab-menus {
					height: auto;
					flex-wrap: wrap; /* Кнопки прыгнут на новую строку, если не влезут */
				}
				.tab-menus button {
					flex: 1 0 33.33%; /* По 3 кнопки в ряд на маленьких экранах */
					height: 50px;
					border-bottom: 1px solid rgba(0, 0, 0, 0.1);
				}
			}
			.cl-section {
				margin-bottom: 25px;
			}
			.cl-title-container {
				border-bottom: 2px solid black;
				margin-bottom: 10px;
			}
			.cl-title {
				font-size: 24px;
				padding-bottom: 5px;
				color: #333;
				margin-left: 10px;
			}
			.cl-grid {
				margin-left: 10px;
				margin-right: 10px;
				display: grid;
				grid-template-columns: 1fr 1fr 1fr;
				gap: 15px;
			}

			.cl-field {
				display: flex;
				flex-direction: column;
				margin-bottom: 10px;
			}

			.cl-label {
				font-size: 16px;
				color: #1f2937;
				margin-left: 10px;
				margin-bottom: 5px;
				margin-top: 10px;
			}

			.cl-input {
				padding: 10px;
				border: 2px solid #333;
				border-radius: 9px;
				font-size: 14px;
				width: 100%;
			}

			.cl-select {
				padding: 10px;
				border: 2px solid #333;
				border-radius: 9px;
				font-size: 14px;
				width: 100%;
				background-color: white;
				cursor: pointer;
			}

			.cl-select:focus {
				border-color: #6d272c;
				outline: none;
			}

			/* Состояния валидации */
			.cl-input.invalid {
				border: 2px solid #ff0011 !important;
				background-color: #fff5f5 !important;
			}

			.cl-input:focus {
				border-color: #6d272c;
				outline: none;
			}
			#receiptPhotoInput {
				background-color: white;
			}
			#productPhotoInput {
				background-color: white;
			}

			.photo-grid {
				display: flex;
				gap: 20px;
				margin: 20px 10px;
				flex-wrap: wrap;
			}

			.photo-box {
				flex: 1;
				border: 2px solid black;
				border-radius: 9px;
				padding: 15px;
				text-align: center;
				background: white;
				min-width: 200px;
			}

			.photo-label {
				display: block;
				font-size: 16px;
				font-weight: bold;
				color: #1f2937;
				margin-bottom: 10px;
			}

			.generate-btn-container {
				text-align: center;
				margin: 30px 0;
			}

			.btn-main {
				background-color: #c9a27a;
				border: none;
				padding: 15px 80px;
				border-radius: 10px;
				font-size: 32px;
				font-weight: bold;
				color: #333;
				cursor: pointer;
				transition: background 0.3s;
			}

			.btn-main:hover {
				background-color: #b58f66;
			}
		</style>
	</head>
	<div class="tab-menus">
		<button onclick="loadView('claims')">Претензии</button>
		<button onclick="loadView('lawsuits')">Иски</button>
		<button onclick="loadView('reports')">Отчет</button>
		<button onclick="loadView('notices')">Уведомления</button>
		<button style="border: none" onclick="loadView('settlements')">
			Мировое соглашение
		</button>
	</div>
	<body style="background-color: #faf7f3">
		<div class="cl-container">
			<div class="cl-section">
				<div class="cl-title-container">
					<h2 class="cl-title">Магазин</h2>
				</div>
				<div class="cl-grid">
					<div class="cl-field">
						<label class="cl-label">Название</label>
						<input type="text" class="cl-input" id="shopName" value="" />
					</div>
					<div class="cl-field">
						<label class="cl-label">Область, город</label>
						<input type="text" class="cl-input" id="shopLocation" value="" />
					</div>
					<div class="cl-field">
						<label class="cl-label">Улица</label>
						<input type="text" class="cl-input" id="shopStreet" value="" />
					</div>
				</div>
			</div>

			<div class="cl-section">
				<div class="cl-title-container">
					<h2 class="cl-title">Реквизиты продавца</h2>
				</div>
				<div class="cl-grid">
					<div class="cl-field">
						<label class="cl-label">Наименование</label>
						<input type="text" class="cl-input" id="sellerName" value="" />
					</div>
					<div class="cl-field">
						<label class="cl-label">ОГРН</label>
						<input type="text" class="cl-input" id="sellerOgrn" value="" />
					</div>
					<div class="cl-field">
						<label class="cl-label">ИНН</label>
						<input type="text" class="cl-input" id="sellerInn" value="" />
					</div>
					<div class="cl-field">
						<label class="cl-label">Юридический адрес</label>
						<input
							type="text"
							class="cl-input"
							id="sellerLegalAddress"
							value="" />
					</div>
				</div>
			</div>

			<div class="cl-section">
				<div class="cl-title-container">
					<h2 class="cl-title">Информация о закупке</h2>
				</div>
				<div class="cl-grid">
					<div class="cl-field">
						<label class="cl-label">Дата закупки</label>
						<input type="date" class="cl-input" id="purchaseDate" value="" />
					</div>
					<div class="cl-field">
						<label class="cl-label">Категория</label>
						<select class="cl-select" id="productCategory">
							<option value="" disabled selected>Выберите категорию</option>
							<option value="одежда">Одежда</option>
							<option value="пестициды">Пестициды</option>
							<option value="игрушки">Игрушки</option>
							<option value="обувь">Обувь</option>
							<option value="головные уборы">Головные уборы</option>
							<option value="семена">Семена</option>
							<option value="открытки">Открытки</option>
							<option value="сумки">Сумки</option>
							<option value="маникюрные принадлежности">
								Маникюрные принадлежности
							</option>
							<option value="духи">Духи</option>
						</select>
					</div>
					<div class="cl-field">
						<label class="cl-label">Название категории</label>
						<input
							type="text"
							class="cl-input"
							id="productCategoryName"
							value=""
							placeholder="Введите название категории" />
					</div>
					<div class="cl-field">
						<label class="cl-label">Стоимость</label>
						<input type="number" class="cl-input" id="productPrice" value="" />
					</div>
					<div class="cl-field">
						<label class="cl-label">Количество</label>
						<input type="number" class="cl-input" id="productCount" value="" />
					</div>
					<div class="cl-field">
						<label class="cl-label">Товарный знак</label>
						<input type="text" class="cl-input" id="trademark" value="" />
					</div>
					<div class="cl-field">
						<label class="cl-label">Правообладатель</label>
						<input type="text" class="cl-input" id="rightHolder" value="" />
					</div>
					<div class="cl-field">
						<label class="cl-label">Сумма компенсации (₽)</label>
						<input
							type="number"
							class="cl-input"
							id="compensationAmount"
							value=""
							placeholder="Например: 50000" />
					</div>
				</div>
			</div>

			<div class="photo-grid">
				<div class="photo-box" id="productPhotoBox">
					<span class="photo-label">Фото товара</span>
					<input type="file" id="productPhotoInput" />
					<div
						id="productPhotoName"
						style="
							margin-top: 10px;
							font-size: 12px;
							color: green;
							font-weight: bold;
							text-align: center;
							display: none;
						"></div>
				</div>
				<div class="photo-box" id="receiptPhotoBox">
					<span class="photo-label">Фото чека/слип-чека</span>
					<input type="file" id="receiptPhotoInput" />
					<div
						id="receiptPhotoName"
						style="
							margin-top: 10px;
							font-size: 12px;
							color: green;
							font-weight: bold;
							text-align: center;
							display: none;
						"></div>
				</div>
			</div>

			<div class="generate-btn-container">
				<button class="btn-main" id="generateClaimsBtn">Сгенерировать</button>
			</div>
		</div>
	</body>
</html>
