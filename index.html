<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<link rel="stylesheet" href="./src/styles/styles.css" />
		<style>
			/* Обнуляем отступы для всего окна */
			html,
			body {
				margin: 0;
				padding: 0;
				height: 100%;
				width: 100%;
				font-family: 'Times New Roman', Times, serif; /* Шрифт как на макете */
			}

			/* Основной контейнер приложения */
			body {
				display: flex; /* Магия Flexbox для размещения меню и контента рядом */
				background-color: #faf7f3;
				overflow: hidden; /* Скроллим только контент */
			}
			/* --- СТИЛИ ДЛЯ ИКОНКИ ПОЛЬЗОВАТЕЛЯ И МЕНЮ --- */
			.user-footer {
				padding: 0 0 30px 25px;
				position: relative; /* Важно для позиционирования выпадающего списка */
			}

			/* Контейнер аватара (круг) */
			.user-avatar {
				width: 50px;
				height: 50px;
				background-color: white;
				border-radius: 50%; /* Всегда круг */
				display: flex;
				justify-content: center;
				align-items: center;
				box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
				cursor: pointer;
				transition: transform 0.2s ease;
			}

			.user-avatar:hover {
				transform: scale(1.05);
			}

			.user-avatar-initial {
				font-size: 24px;
				color: #7a1f2b; /* Цвет буквы в тон меню */
				font-weight: bold;
			}

			/* Выпадающее меню "Выйти" */
			.user-dropdown-menu {
				display: none; /* Скрыто по умолчанию */
				position: absolute;
				bottom: 90px; /* Смещение вверх над аватаром */
				left: 25px;
				background-color: #fdfaf7;
				border: 1px solid #c4a484;
				border-radius: 8px;
				min-width: 150px;
				box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
				z-index: 10001;
				overflow: hidden;
			}

			.user-dropdown-menu.show {
				display: block; /* Показываем по клику */
			}

			.dropdown-item {
				padding: 12px 16px;
				cursor: pointer;
				color: #333;
				font-size: 14px;
				transition: background 0.2s;
			}

			.dropdown-item:hover {
				background-color: #f0f0f0;
			}

			.dropdown-item.logout-type {
				color: #7a1f2b;
				border-top: 1px solid #eee;
				font-weight: bold;
			}
			/* --- СТИЛИ ДЛЯ ВЕРТИКАЛЬНОЙ ПАНЕЛИ НАВИГАЦИИ --- */
			.full-tab-menu {
				display: flex;
				flex-direction: column; /* Элементы идут сверху вниз */
				background-color: #7a1f2b; /* Бордовый цвет фона */
				width: 260px; /* Ширина панели с макета */
				height: 100vh; /* На всю высоту окна */
				flex-shrink: 0; /* Чтобы панель не сжималась */
				justify-content: space-between; /* Лого/кнопки сверху, иконка юзера внизу */
				box-sizing: border-box;
			}

			/* Верхний блок: Логотип + Кнопки */
			.menu-top-group {
				display: flex;
				flex-direction: column;
				width: 100%;
			}

			/* Блок логотипа (теперь он сверху) */
			.logo-header {
				padding: 30px 20px 20px 25px; /* Отступы для позиционирования лого */
				display: flex;
				justify-content: flex-start; /* Прижимаем влево */
				align-items: center;
			}

			.login-logo {
				height: 35px; /* Размер логотипа с макета */
				width: auto;
			}

			/* Контейнер для списка кнопок */
			.tab-menu {
				display: flex;
				flex-direction: column;
				width: 100%; /* Единый отступ слева для всех кнопок */
				box-sizing: border-box;
			}

			/* Эффект при наведении на кнопку */
			.tab-menu > button:hover {
				opacity: 0.8;
			}

			/* --- СТИЛИ ДЛЯ ИКОНКИ ПОЛЬЗОВАТЕЛЯ (ВНИЗУ) --- */
			.user-footer {
				padding: 0 0 30px 25px; /* Отступы снизу и слева */
				display: flex;
				justify-content: flex-start;
				background-color: #7a1f2b;
			}

			.user-avatar {
				width: 50px; /* Размер круга */
				height: 50px;
				background-color: white; /* Белый фон круга */
				border-radius: 50%; /* Делаем круглым */
				display: flex;
				justify-content: center;
				align-items: center;
				box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
			}
			/* Состояние активной кнопки */
			/* Обновленные стили кнопок в index.html */
			.tab-menu > button {
				background-color: transparent;
				cursor: pointer;
				color: white;
				border: none;
				font-size: 16px;
				padding: 12px 25px; /* Возвращаем стандартный отступ */
				text-align: left;
				font-family: 'Times New Roman', Times, serif;
				width: 100%;
				box-sizing: border-box;

				/* Добавляем магию плавности */
				transition:
					background-color 0.3s ease,
					border-left 0.3s ease,
					padding-left 0.3s ease;
				border-left: 0px solid transparent;
			}

			/* Эффект при наведении (тоже плавный) */
			.tab-menu > button:hover {
				background-color: rgba(255, 255, 255, 0.05);
			}

			/* Активное состояние с плавным проявлением */
			.tab-menu > button.active {
				background-color: rgba(
					255,
					255,
					255,
					0.15
				); /* Чуть светлее основного фона #7a1f2b */
				font-weight: bold;
				border-left: 5px solid #c9a27a; /* Золотистая полоска */
				padding-left: 30px; /* Небольшое смещение текста вправо для акцента */
				opacity: 1;
			}
			.user-avatar-initial {
				font-size: 28px; /* Размер буквы */
				color: #333; /* Цвет буквы (темный) */
				font-weight: bold;
				font-family: 'Times New Roman', Times, serif;
			}

			/* --- ОБЛАСТЬ КОНТЕНТА --- */
			#content-viewport {
				flex-grow: 1; /* Занимает все оставшееся место */
				height: 100vh;
				overflow-y: auto; /* Прокрутка только здесь */
				box-sizing: border-box;
			}

			/* Стили для тоста (оставляем как были) */
			.error-toast {
				position: fixed;
				bottom: 30px;
				right: 30px;
				min-width: 250px;
				padding: 16px 24px;
				color: white;
				background-color: #ff4d4d;
				border-radius: 8px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
				z-index: 10000;
				display: none;
			}
			/* Используем те же стили, что и для удаления клиента */
			.confirm-modal {
				display: none;
				position: fixed;
				z-index: 20000; /* Самый высокий слой */
				left: 0;
				top: 0;
				width: 100vw;
				height: 100vh;
				background-color: rgba(0, 0, 0, 0.6);
				backdrop-filter: blur(3px);
				align-items: center;
				justify-content: center;
			}

			.confirm-modal-content {
				background-color: #fdfaf7;
				padding: 30px;
				border-radius: 15px;
				width: 380px;
				text-align: center;
				border: 1px solid #c4a484;
				box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
				animation: modalFadeIn 0.3s ease;
			}

			/* Стили заголовка и кнопок как в "Новых клиентах" */
			.confirm-modal-content h4 {
				color: #731a20;
				margin-bottom: 15px;
			}
			.confirm-actions {
				display: flex;
				justify-content: center;
				gap: 15px;
			}

			.cancel-btn {
				background: #fff;
				border: 1px solid #ccc;
				padding: 10px 25px;
				border-radius: 8px;
				cursor: pointer;
			}
			.confirm-btn {
				background: #731a20;
				color: white;
				border: none;
				padding: 10px 25px;
				border-radius: 8px;
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<nav class="full-tab-menu">
			<div class="menu-top-group">
				<div class="logo-header">
					<img
						src="./src/assets/images/white_logo1.png"
						alt="YUKSH"
						class="login-logo" />
				</div>
				<div class="tab-menu">
					<button onclick="loadView('profile')" class="active">
						Личный кабинет
					</button>
					<button onclick="loadView('activity')">Журнал активности</button>
					<button onclick="loadView('claims')">Генерации</button>
					<button onclick="loadView('new-clients')">Новые клиенты</button>
					<button onclick="loadView('foreign-clients')">
						Иностранные клиенты
					</button>
					<button onclick="loadView('ru-clients')">Клиент РФ</button>
					<button onclick="loadView('charts')">Столбчатая диаграмма</button>
				</div>
			</div>

			<div class="user-footer">
				<div id="userDropdown" class="user-dropdown-menu">
					<div class="dropdown-item" onclick="loadView('profile')">Профиль</div>
					<div class="dropdown-item logout-type" onclick="handleLogout()">
						Выйти
					</div>
				</div>

				<div
					id="userAvatar"
					class="user-avatar"
					onclick="toggleUserMenu(event)">
					<span class="user-avatar-initial">Й</span>
				</div>
			</div>
		</nav>

		<div id="content-viewport">
			<h1>Добро пожаловать</h1>
			<p>Выберите раздел в меню слева.</p>
		</div>

		<script src="./renderer.js"></script>

		<div id="errorToast" class="error-toast">
			Пожалуйста, заполните выделенные поля
		</div>
		<div id="logoutModal" class="confirm-modal">
			<div class="confirm-modal-content">
				<h4>Завершение работы</h4>
				<p id="logoutModalText">Вы действительно хотите выйти из приложения?</p>
				<div class="confirm-actions">
					<button class="cancel-btn" onclick="closeLogoutModal()">
						Отмена
					</button>
					<button class="confirm-btn" onclick="exitApp()">Выйти</button>
				</div>
			</div>
		</div>
	</body>
	<script>
		// Переключение видимости меню
		function toggleUserMenu(event) {
			event.stopPropagation() // Чтобы клик не пробрасывался дальше
			const menu = document.getElementById('userDropdown')
			menu.classList.toggle('show')
		}

		// Закрытие меню при клике в любое другое место экрана
		window.addEventListener('click', function () {
			const menu = document.getElementById('userDropdown')
			if (menu && menu.classList.contains('show')) {
				menu.classList.remove('show')
			}
		})

		// Открыть модалку выхода
		function handleLogout() {
			const modal = document.getElementById('logoutModal')
			if (modal) {
				modal.style.display = 'flex'
				// Скрываем выпадающее меню аватара, если оно открыто
				document.getElementById('userDropdown').classList.remove('show')
			}
		}

		// Закрыть модалку (кнопка Отмена)
		function closeLogoutModal() {
			document.getElementById('logoutModal').style.display = 'none'
		}

		// Полный выход из приложения
		function exitApp() {
			window.close()
		}
	</script>
</html>
